name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.
        **Never include your API keys or credentials.**

  - type: input
    id: version
    attributes:
      label: etoro-cli version
      description: Run `etoro --version` or check the release tag
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 14, Ubuntu 22.04, Windows 11
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: Include all flags. Redact any sensitive values.
      placeholder: etoro buy AAPL --amount 100 --confirm
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Paste the full output or error message
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config (redacted)
      description: Paste any relevant config values — remove all keys and credentials
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help
