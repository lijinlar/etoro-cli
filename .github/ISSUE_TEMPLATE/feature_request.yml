name: Feature Request
description: Suggest a new command, flag, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. Describe the use case and we'll figure out if it fits.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do that's currently difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you expect it to work? Include example commands or flags if possible.
      placeholder: |
        etoro alerts --symbol AAPL --threshold 5%
        # would notify when price moves > 5% in a day
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other ways this could be implemented

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important
        - Blocking my use case
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
